<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>#GoTeamOlatoyes - Family Quiz Hub</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      max-width: 600px;
      text-align: center;
    }
    
    h1 {
      font-size: clamp(2rem, 8vw, 3.5rem);
      margin-bottom: 10px;
      background: linear-gradient(135deg, #ff6b9d 0%, #ffd93d 50%, #00d9a5 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .subtitle {
      font-size: 1.2rem;
      color: rgba(255,255,255,0.7);
      margin-bottom: 40px;
    }
    
    .quiz-list {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    
    .quiz-link {
      display: block;
      padding: 20px 30px;
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 16px;
      color: #fff;
      text-decoration: none;
      font-size: 1.2rem;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    
    .quiz-link:hover {
      background: rgba(255,255,255,0.2);
      border-color: #ff6b9d;
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(255,107,157,0.2);
    }
    
    .quiz-link .emoji {
      font-size: 1.5rem;
      margin-right: 10px;
    }
    
    .quiz-link .date {
      display: block;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.5);
      font-weight: 400;
      margin-top: 5px;
    }
    
    .coming-soon {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .coming-soon:hover {
      transform: none;
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.2);
      box-shadow: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>#GoTeamOlatoyes</h1>
    <p class="subtitle">Family Quiz Hub 🎮</p>
    
    <div class="quiz-list">
      <a href="./christmas2025/" class="quiz-link">
        <span class="emoji">🎄</span> Christmas Quiz 2025
        <span class="date">December 2025 - Team Middleton Winners! 🏆</span>
      </a>
      
      <a href="./march2026/" class="quiz-link coming-soon">
        <span class="emoji">🚀</span> March 2026 Quiz
        <span class="date">Coming Soon...</span>
      </a>
    </div>
  </div>
</body>
</html>
