<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Code Quest — Activity Report</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Segoe UI', sans-serif; background:#0f172a; color:#e2e8f0; padding:24px; }
  h1 { font-size:28px; font-weight:900; color:white; margin-bottom:4px; }
  .subtitle { color:#94a3b8; font-size:14px; margin-bottom:32px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:20px; margin-bottom:32px; }
  .card { background:#1e293b; border-radius:16px; padding:20px; border:1px solid #334155; }
  .card h2 { font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; color:#64748b; margin-bottom:16px; }
  .stat { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid #1e293b; }
  .stat:last-child { border-bottom:none; }
  .stat-avatar { font-size:28px; width:44px; height:44px; display:flex; align-items:center; justify-content:center; background:#0f172a; border-radius:10px; flex-shrink:0; }
  .stat-info { flex:1; }
  .stat-name { font-size:15px; font-weight:700; color:white; }
  .stat-sub  { font-size:12px; color:#64748b; margin-top:2px; }
  .stat-right { text-align:right; flex-shrink:0; }
  .xp { font-size:18px; font-weight:900; color:#f59e0b; }
  .level-badge { font-size:11px; background:#7c3aed; color:white; padding:3px 8px; border-radius:100px; font-weight:700; }
  .progress-bar { height:6px; background:#334155; border-radius:3px; margin-top:6px; overflow:hidden; }
  .progress-fill { height:100%; background:linear-gradient(90deg,#4f46e5,#7c3aed); border-radius:3px; transition:width 0.5s; }
  .msg-row { padding:10px 0; border-bottom:1px solid #1e293b; }
  .msg-row:last-child { border-bottom:none; }
  .msg-meta { font-size:11px; color:#64748b; margin-bottom:3px; }
  .msg-body { font-size:14px; color:#e2e8f0; line-height:1.4; }
  .channel-tag { display:inline-block; font-size:10px; padding:2px 7px; border-radius:100px; font-weight:700; margin-right:6px; }
  .ch-everyone { background:rgba(99,102,241,0.3); color:#a5b4fc; }
  .ch-team     { background:rgba(236,72,153,0.3); color:#f9a8d4; }
  .ch-dm       { background:rgba(245,158,11,0.3); color:#fcd34d; }
  .empty { color:#475569; font-size:14px; text-align:center; padding:20px; }
  .summary-num { font-size:36px; font-weight:900; color:white; }
  .summary-label { font-size:12px; color:#64748b; text-transform:uppercase; letter-spacing:1px; margin-top:2px; }
  .summary-card { background:#1e293b; border-radius:16px; padding:20px 24px; border:1px solid #334155; text-align:center; }
  .team-card { background:#1e293b; border-radius:16px; padding:20px; border:1px solid #334155; margin-bottom:16px; }
  .team-name { font-size:20px; font-weight:900; color:white; margin-bottom:4px; }
  .team-xp { font-size:14px; color:#f59e0b; font-weight:700; }
  .timestamp { font-size:11px; color:#475569; }
  .alert { background:#7c3aed22; border:1px solid #7c3aed66; border-radius:12px; padding:16px; margin-bottom:20px; font-size:14px; color:#c4b5fd; }
  .no-activity { color:#ef4444; font-size:12px; font-weight:700; }
  .has-activity { color:#22c55e; font-size:12px; font-weight:700; }
  #loading { text-align:center; padding:60px; color:#64748b; font-size:18px; }
  #report { display:none; }
  .section-title { font-size:20px; font-weight:900; color:white; margin:32px 0 16px; border-left:4px solid #7c3aed; padding-left:12px; }
</style>
</head>
<body>


<div id="pinGate" style="position:fixed;inset:0;background:#0f172a;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;padding:24px;">
  <div style="font-size:56px;margin-bottom:16px;">🔐</div>
  <h2 style="font-size:24px;font-weight:900;color:white;margin-bottom:8px;font-family:'Segoe UI',sans-serif;">Code Quest Reports</h2>
  <p style="font-size:14px;color:#64748b;margin-bottom:32px;font-family:'Segoe UI',sans-serif;">Parents only — enter your PIN to continue</p>
  <input id="pinInput" type="password" placeholder="Enter PIN"
    style="background:#1e293b;border:2px solid #334155;color:white;font-size:20px;letter-spacing:6px;text-align:center;border-radius:14px;padding:16px 24px;width:100%;max-width:280px;margin-bottom:16px;font-family:'Segoe UI',sans-serif;outline:none;"
    onkeydown="if(event.key==='Enter')checkPin()">
  <button onclick="checkPin()"
    style="background:linear-gradient(135deg,#4f46e5,#7c3aed);color:white;border:none;font-size:16px;font-weight:900;padding:16px 40px;border-radius:14px;cursor:pointer;width:100%;max-width:280px;font-family:'Segoe UI',sans-serif;">
    View Report →
  </button>
  <p id="pinError" style="color:#ef4444;font-size:13px;margin-top:12px;font-family:'Segoe UI',sans-serif;display:none;">Wrong PIN — try again</p>
  <p style="font-size:12px;color:#1e3a5f;margin-top:40px;font-family:'Segoe UI',sans-serif;">olatoyeacademy.com</p>
</div>

<script>
  // PIN is: 0404  (hackathon date — easy for parents to remember)
  const CORRECT_PIN = '0404';
  // Check if already authenticated this session
  if (sessionStorage.getItem('cq_report_auth') === '1') {
    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('pinGate').style.display = 'none';
    });
  }
  function checkPin() {
    const val = document.getElementById('pinInput').value.trim();
    if (val === CORRECT_PIN) {
      sessionStorage.setItem('cq_report_auth', '1');
      document.getElementById('pinGate').style.display = 'none';
    } else {
      document.getElementById('pinError').style.display = 'block';
      document.getElementById('pinInput').value = '';
      document.getElementById('pinInput').focus();
    }
  }
</script>

<div id="loading">⏳ Loading activity data...</div>
<div id="report">
  <h1>🚀 Code Quest — Activity Report</h1>
  <p class="subtitle" id="reportTime"></p>

  <div id="summaryGrid" class="grid"></div>

  <div class="section-title">👤 Kids — Progress & XP</div>
  <div id="kidsSection"></div>

  <div class="section-title">👥 Teams</div>
  <div id="teamsSection"></div>

  <div class="section-title">💬 Recent Messages</div>
  <div class="card"><div id="messagesSection"></div></div>

  <div class="section-title">🤖 Claude Studio Sessions</div>
  <div class="card"><div id="studioSection"></div></div>
</div>

<script>
const SUPABASE_URL = 'https://pwpxachynrhmkeowxmhg.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB3cHhhY2h5bnJobWtlb3d4bWhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0ODM4NTMsImV4cCI6MjA4OTA1OTg1M30.vMzH379AZ--rY-YJljDDOwJ5xpNnJcq4dH_WfX8Yy4U';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const LEVEL_NAMES = ['','Say Hello','Ask a Question','Get Creative','Build a Page','Make it Cool','Build a Game','Hackathon Ready!'];
const TOTAL_LEVELS = 7;

function timeAgo(iso) {
  if (!iso) return 'never';
  const d = new Date(iso), now = new Date();
  const diff = Math.floor((now - d) / 1000);
  if (diff < 60)   return diff + 's ago';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  return Math.floor(diff/86400) + 'd ago';
}

function channelTag(ch) {
  if (ch === 'everyone') return '<span class="channel-tag ch-everyone">🌍 Everyone</span>';
  if (ch.startsWith('team:')) return '<span class="channel-tag ch-team">👥 Team</span>';
  return '<span class="channel-tag ch-dm">💌 DM</span>';
}

async function run() {
  const [
    { data: users },
    { data: teams },
    { data: messages },
    { data: sessions }
  ] = await Promise.all([
    db.from('hackathon_users').select('*').order('xp', { ascending: false }),
    db.from('hackathon_teams').select('*').order('xp', { ascending: false }),
    db.from('hackathon_messages').select('*').order('created_at', { ascending: false }).limit(100),
    db.from('studio_sessions').select('*').order('updated_at', { ascending: false }).limit(50)
  ]);

  document.getElementById('loading').style.display = 'none';
  document.getElementById('report').style.display = 'block';
  document.getElementById('reportTime').textContent = 'Generated ' + new Date().toLocaleString('en-GB', {weekday:'long',year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'});

  const kids = (users||[]).filter(u => u.role !== 'parent');
  const parents = (users||[]).filter(u => u.role === 'parent');
  const totalXP = kids.reduce((a,u) => a + (u.xp||0), 0);
  const levelsComplete = kids.filter(u => (u.current_mission||1) > TOTAL_LEVELS);
  const activeKids = kids.filter(u => (u.current_mission||1) > 1);
  const msgCount = (messages||[]).filter(m => {
    const u = kids.find(k => k.id === m.sender_id);
    return !!u;
  }).length;

  // Summary
  document.getElementById('summaryGrid').innerHTML = [
    { num: kids.length, label: 'Kids Signed Up', icon: '👦👧' },
    { num: activeKids.length, label: 'Active (started levels)', icon: '🎮' },
    { num: totalXP.toLocaleString(), label: 'Total XP Earned', icon: '⭐' },
    { num: (messages||[]).length, label: 'Messages Sent', icon: '💬' },
    { num: (sessions||[]).length, label: 'Studio Sessions', icon: '🤖' },
    { num: (teams||[]).length, label: 'Teams', icon: '👥' },
  ].map(s => `
    <div class="summary-card">
      <div style="font-size:32px;margin-bottom:8px;">${s.icon}</div>
      <div class="summary-num">${s.num}</div>
      <div class="summary-label">${s.label}</div>
    </div>`).join('');

  // Kids
  const kidTeamMap = {};
  (teams||[]).forEach(t => kidTeamMap[t.id] = t);

  document.getElementById('kidsSection').innerHTML = kids.length ? kids.map(u => {
    const level = u.current_mission || 1;
    const levelsCompleted = Math.max(0, level - 1);
    const pct = Math.round((levelsCompleted / TOTAL_LEVELS) * 100);
    const team = u.team_id ? kidTeamMap[u.team_id] : null;
    const currentLevelName = level > TOTAL_LEVELS ? '🏆 All Done!' : (LEVEL_NAMES[level] || 'Level ' + level);
    const lastMsg = (messages||[]).find(m => m.sender_id === u.id);
    const lastSession = (sessions||[]).find(s => s.user_id === u.id);
    const isActive = levelsCompleted > 0 || lastMsg || lastSession;
    return `<div class="card" style="margin-bottom:16px;">
      <div class="stat" style="border-bottom:1px solid #334155;padding-bottom:14px;margin-bottom:12px;">
        <div class="stat-avatar">${u.avatar && !u.avatar.startsWith('data:') ? u.avatar : '🦸'}</div>
        <div class="stat-info">
          <div class="stat-name">${u.display_name}</div>
          <div class="stat-sub">${team ? team.icon+' '+team.name : '<span style="color:#ef4444">No team yet</span>'} · Joined ${timeAgo(u.created_at)}</div>
          <div style="margin-top:6px;">
            <span class="level-badge">Level ${level > TOTAL_LEVELS ? TOTAL_LEVELS : level}/7 — ${currentLevelName}</span>
            <span style="margin-left:8px;font-size:11px;color:#64748b;">${levelsCompleted} level${levelsCompleted!==1?'s':''} complete</span>
          </div>
          <div class="progress-bar" style="margin-top:8px;"><div class="progress-fill" style="width:${pct}%"></div></div>
        </div>
        <div class="stat-right">
          <div class="xp">${(u.xp||0).toLocaleString()} ⭐</div>
          <div class="${isActive ? 'has-activity' : 'no-activity'}">${isActive ? '● Active' : '● Not started'}</div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:12px;color:#94a3b8;">
        <div>💬 Last message: <strong style="color:white">${lastMsg ? timeAgo(lastMsg.created_at) : 'none'}</strong></div>
        <div>🤖 Last studio: <strong style="color:white">${lastSession ? timeAgo(lastSession.updated_at) : 'none'}</strong></div>
        <div>📨 Total messages: <strong style="color:white">${(messages||[]).filter(m=>m.sender_id===u.id).length}</strong></div>
        <div>🔬 Studio sessions: <strong style="color:white">${(sessions||[]).filter(s=>s.user_id===u.id).length}</strong></div>
      </div>
    </div>`;
  }).join('') : '<div class="empty">No kids signed up yet</div>';

  // Teams
  document.getElementById('teamsSection').innerHTML = (teams||[]).length ? (teams||[]).map(t => {
    const members = kids.filter(u => u.team_id === t.id);
    return `<div class="team-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <div><div class="team-name">${t.icon} ${t.name}</div><div class="team-xp">Team XP: ${(t.xp||0).toLocaleString()} ⭐</div></div>
        <div style="font-size:13px;color:#64748b;">${members.length} member${members.length!==1?'s':''}</div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        ${members.map(m => `<div style="background:#0f172a;border-radius:8px;padding:8px 12px;font-size:13px;color:#e2e8f0;font-weight:700;">${m.avatar && !m.avatar.startsWith('data:') ? m.avatar : '🦸'} ${m.display_name} <span style="color:#f59e0b">${(m.xp||0)}★</span></div>`).join('')}
        ${members.length === 0 ? '<div style="color:#475569;font-size:13px;">No members yet</div>' : ''}
      </div>
    </div>`;
  }).join('') : '<div class="empty">No teams created yet</div>';

  // Messages
  document.getElementById('messagesSection').innerHTML = (messages||[]).length ? (messages||[]).slice(0,50).map(m => `
    <div class="msg-row">
      <div class="msg-meta">${channelTag(m.channel)}<strong style="color:#c4b5fd">${m.sender_name}</strong> <span class="timestamp">· ${timeAgo(m.created_at)} · ${new Date(m.created_at).toLocaleString('en-GB')}</span></div>
      <div class="msg-body">${(m.body||'').replace(/</g,'&lt;').replace(/>/g,'&gt;').substring(0,200)}</div>
    </div>`).join('') : '<div class="empty">No messages yet</div>';

  // Studio sessions
  document.getElementById('studioSection').innerHTML = (sessions||[]).length ? (sessions||[]).slice(0,20).map(s => {
    const kid = kids.find(k => k.id === s.user_id);
    const levelName = LEVEL_NAMES[s.level_id] || 'Level ' + s.level_id;
    const msgCount = Array.isArray(s.history) ? s.history.length : 0;
    return `<div class="msg-row">
      <div class="msg-meta"><strong style="color:#c4b5fd">${kid ? kid.display_name : s.user_id}</strong> · ${levelName} · <span class="timestamp">last active ${timeAgo(s.updated_at)}</span></div>
      <div class="msg-body" style="color:#94a3b8;">${Math.floor(msgCount/2)} exchanges with Claude · ${s.has_preview ? '🖥️ Has preview' : 'No preview'}</div>
    </div>`;
  }).join('') : '<div class="empty">No studio sessions yet</div>';
}

run().catch(e => {
  document.getElementById('loading').innerHTML = '❌ Error loading data: ' + e.message;
});
</script>
</body>
</html>
