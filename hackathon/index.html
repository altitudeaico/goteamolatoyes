<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CODE QUEST 🚀</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(180deg, #4f46e5 0%, #7c3aed 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px 20px;
      color: white;
      text-align: center;
    }
    
    .hide { display: none !important; }
    
    /* Big emoji at top */
    .emoji {
      font-size: 100px;
      margin-bottom: 20px;
      animation: bounce 1s ease infinite;
    }
    
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }
    
    /* Main text */
    h1 {
      font-size: 32px;
      font-weight: 900;
      margin-bottom: 15px;
      line-height: 1.2;
    }
    
    p {
      font-size: 20px;
      opacity: 0.9;
      margin-bottom: 30px;
      max-width: 300px;
      line-height: 1.4;
    }
    
    /* Big button */
    .btn {
      width: 100%;
      max-width: 300px;
      padding: 25px 40px;
      font-size: 22px;
      font-weight: 900;
      font-family: 'Nunito', sans-serif;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      margin: 8px 0;
      transition: transform 0.1s;
    }
    
    .btn:active {
      transform: scale(0.95);
    }
    
    .btn-green {
      background: #22c55e;
      color: white;
      box-shadow: 0 8px 0 #16a34a;
    }
    
    .btn-green:active {
      box-shadow: 0 4px 0 #16a34a;
      transform: translateY(4px);
    }
    
    .btn-white {
      background: white;
      color: #4f46e5;
      box-shadow: 0 8px 0 #d1d5db;
    }
    
    .btn-yellow {
      background: #fbbf24;
      color: #1f2937;
      box-shadow: 0 8px 0 #d97706;
    }
    
    .btn-small {
      background: rgba(255,255,255,0.2);
      color: white;
      font-size: 18px;
      padding: 18px 30px;
      box-shadow: none;
    }
    
    /* Input */
    input {
      width: 100%;
      max-width: 300px;
      padding: 20px;
      font-size: 24px;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      border: 4px solid white;
      border-radius: 15px;
      text-align: center;
      margin-bottom: 20px;
      background: rgba(255,255,255,0.95);
      color: #1f2937;
    }
    
    input:focus {
      outline: none;
      border-color: #fbbf24;
    }
    
    input::placeholder {
      color: #9ca3af;
    }
    
    /* Avatar grid */
    .avatars {
      display: grid;
      grid-template-columns: repeat(4, 70px);
      gap: 15px;
      margin: 20px 0;
      justify-content: center;
    }
    
    .avatar {
      width: 70px;
      height: 70px;
      font-size: 40px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: 4px solid transparent;
      transition: all 0.2s;
    }
    
    .avatar.selected {
      background: white;
      border-color: #fbbf24;
      transform: scale(1.15);
    }
    
    /* Progress dots */
    .dots {
      display: flex;
      gap: 12px;
      margin: 20px 0;
    }
    
    .dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
    }
    
    .dot.done { background: #22c55e; }
    .dot.now { background: #fbbf24; animation: pulse 1s infinite; }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.3); }
    }
    
    /* XP display */
    .xp {
      position: fixed;
      top: 20px;
      right: 20px;
      background: #fbbf24;
      color: #1f2937;
      padding: 12px 20px;
      border-radius: 100px;
      font-size: 20px;
      font-weight: 900;
    }
    
    /* Copy box */
    .copybox {
      background: rgba(0,0,0,0.3);
      border-radius: 15px;
      padding: 20px;
      margin: 20px 0;
      max-width: 320px;
      text-align: left;
    }
    
    .copybox code {
      font-family: monospace;
      font-size: 14px;
      line-height: 1.5;
      display: block;
      white-space: pre-wrap;
      color: #a5f3fc;
    }
    
    /* Toast */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #22c55e;
      color: white;
      padding: 15px 30px;
      border-radius: 15px;
      font-weight: 800;
      font-size: 18px;
      transition: transform 0.3s;
      z-index: 100;
    }
    
    .toast.show {
      transform: translateX(-50%) translateY(0);
    }
    
    .toast.error {
      background: #ef4444;
    }
    
    /* Level card */
    .level-card {
      background: white;
      border-radius: 25px;
      padding: 25px;
      width: 100%;
      max-width: 320px;
      margin: 15px 0;
      color: #1f2937;
      cursor: pointer;
      transition: transform 0.2s;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    
    .level-card:active {
      transform: scale(0.97);
    }
    
    .level-card.locked {
      opacity: 0.5;
      pointer-events: none;
    }
    
    .level-card.done {
      background: #dcfce7;
    }
    
    .level-icon {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #f3f4f6;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      flex-shrink: 0;
    }
    
    .level-card.done .level-icon {
      background: #22c55e;
    }
    
    .level-card.current .level-icon {
      background: #fbbf24;
      animation: pulse 2s infinite;
    }
    
    .level-info h3 {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 5px;
    }
    
    .level-info span {
      font-size: 14px;
      color: #6b7280;
      font-weight: 700;
    }
    
    /* Leaderboard */
    .leader {
      background: rgba(255,255,255,0.15);
      border-radius: 15px;
      padding: 15px 20px;
      width: 100%;
      max-width: 320px;
      margin: 8px 0;
      display: flex;
      align-items: center;
      gap: 15px;
    }
    
    .leader-rank {
      width: 35px;
      height: 35px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
    }
    
    .leader:nth-child(1) .leader-rank { background: #fbbf24; color: #1f2937; }
    .leader:nth-child(2) .leader-rank { background: #d1d5db; color: #1f2937; }
    .leader:nth-child(3) .leader-rank { background: #cd7f32; }
    
    .leader-name { flex: 1; font-weight: 700; }
    .leader-xp { font-weight: 900; color: #fbbf24; }
    
    .leader.me { border: 3px solid #fbbf24; }
  </style>
</head>
<body>

<div class="xp hide" id="xpDisplay">⭐ 0</div>
<div class="toast" id="toast"></div>

<!-- ========== START ========== -->
<div id="start">
  <div class="emoji">🚀</div>
  <h1>CODE QUEST</h1>
  <p>Learn to build cool stuff with AI!</p>
  <button class="btn btn-green" onclick="go('login')">START</button>
</div>

<!-- ========== LOGIN ========== -->
<div id="login" class="hide">
  <div class="emoji">👋</div>
  <h1>What's your name?</h1>
  <input type="text" id="nameInput" placeholder="Your name">
  <input type="password" id="codeInput" placeholder="Secret code">
  <button class="btn btn-green" onclick="tryLogin()">GO!</button>
  <button class="btn btn-small" onclick="go('signup')">I'm new here</button>
</div>

<!-- ========== SIGNUP ========== -->
<div id="signup" class="hide">
  <div class="emoji">✨</div>
  <h1>Create Account</h1>
  <input type="text" id="newName" placeholder="Your name">
  <input type="password" id="newCode" placeholder="Secret code (4+ letters)">
  <button class="btn btn-green" onclick="trySignup()">CREATE</button>
  <button class="btn btn-small" onclick="go('login')">I have an account</button>
</div>

<!-- ========== PICK AVATAR ========== -->
<div id="avatar" class="hide">
  <div class="emoji" id="pickedAvatar">🦸</div>
  <h1>Pick your hero!</h1>
  <div class="avatars">
    <div class="avatar selected" onclick="pick('🦸',this)">🦸</div>
    <div class="avatar" onclick="pick('🧙',this)">🧙</div>
    <div class="avatar" onclick="pick('🥷',this)">🥷</div>
    <div class="avatar" onclick="pick('🦹',this)">🦹</div>
    <div class="avatar" onclick="pick('🧑‍🚀',this)">🧑‍🚀</div>
    <div class="avatar" onclick="pick('🐉',this)">🐉</div>
    <div class="avatar" onclick="pick('🦄',this)">🦄</div>
    <div class="avatar" onclick="pick('🦊',this)">🦊</div>
  </div>
  <button class="btn btn-yellow" onclick="saveAvatar()">THAT'S ME!</button>
</div>

<!-- ========== HOME ========== -->
<div id="home" class="hide">
  <h1>Hi <span id="userName">Hero</span>! 👋</h1>
  <p>Pick a level to play</p>
  <div id="levelList"></div>
  <button class="btn btn-small" onclick="go('leaders')" style="margin-top:20px;">🏆 Leaderboard</button>
</div>

<!-- ========== LEADERBOARD ========== -->
<div id="leaders" class="hide">
  <h1>🏆 Top Heroes</h1>
  <div id="leaderList"></div>
  <button class="btn btn-white" onclick="go('home')" style="margin-top:20px;">← BACK</button>
</div>

<!-- ========== LEVEL / TASK ========== -->
<div id="task" class="hide">
  <div class="dots" id="taskDots"></div>
  <div class="emoji" id="taskEmoji">🎯</div>
  <h1 id="taskTitle">Do this thing</h1>
  <p id="taskDesc">Explanation here</p>
  <div class="copybox hide" id="copyBox">
    <code id="copyText"></code>
    <button class="btn btn-small" onclick="copyIt()" style="margin-top:15px;width:100%;">📋 COPY THIS</button>
  </div>
  <button class="btn btn-green" onclick="done()">✅ DONE!</button>
  <button class="btn btn-small" onclick="go('home')">← BACK</button>
</div>

<!-- ========== SUCCESS ========== -->
<div id="success" class="hide">
  <div class="emoji">🎉</div>
  <h1>AWESOME!</h1>
  <p id="successMsg">+25 XP</p>
  <button class="btn btn-yellow" onclick="nextStep()">NEXT →</button>
</div>

<!-- ========== LEVEL COMPLETE ========== -->
<div id="levelDone" class="hide">
  <div class="emoji">🏆</div>
  <h1>LEVEL COMPLETE!</h1>
  <p id="levelDoneMsg">You earned 100 XP!</p>
  <button class="btn btn-green" onclick="go('home');showHome();">CONTINUE</button>
</div>

<script>
  // Supabase
  const db = supabase.createClient(
    'https://pwpxachynrhmkeowxmhg.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB3cHhhY2h5bnJobWtlb3d4bWhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0ODM4NTMsImV4cCI6MjA4OTA1OTg1M30.vMzH379AZ--rY-YJljDDOwJ5xpNnJcq4dH_WfX8Yy4U'
  );

  // Game data - SUPER SIMPLE levels
  const LEVELS = [
    {
      id: 1, name: "Say Hello", icon: "👋", xp: 50,
      tasks: [
        { emoji: "🤖", title: "Meet Claude", desc: "Claude is your AI helper. Open claude.ai and say hi!", xp: 50 }
      ]
    },
    {
      id: 2, name: "Ask a Question", icon: "❓", xp: 75,
      tasks: [
        { emoji: "💬", title: "Ask Claude something", desc: "Ask Claude to explain something you're curious about!", xp: 75,
          prompt: `Hey Claude! 

Can you explain how video games are made?

Explain it simply!` }
      ]
    },
    {
      id: 3, name: "Get Creative", icon: "📖", xp: 75,
      tasks: [
        { emoji: "✨", title: "Ask for a story", desc: "Ask Claude to write you a short story!", xp: 75,
          prompt: `Write me a short adventure story about a kid who discovers a magic computer.

Make it exciting! About 5 sentences.` }
      ]
    },
    {
      id: 4, name: "Build a Page", icon: "🎨", xp: 100,
      tasks: [
        { emoji: "🖥️", title: "Make a webpage!", desc: "Ask Claude to make a webpage about you!", xp: 100,
          prompt: `Make me a fun webpage about me:

My name is: [YOUR NAME]
I like: [YOUR HOBBY]
Favorite color: [YOUR COLOR]

Make it colorful with emojis!` }
      ]
    },
    {
      id: 5, name: "Make it Cool", icon: "⚡", xp: 100,
      tasks: [
        { emoji: "🌟", title: "Add more style", desc: "Ask Claude to make your page even cooler!", xp: 100,
          prompt: `Make my webpage cooler! Add:

- Glowing text
- A fun background
- Animations

Update the code!` }
      ]
    },
    {
      id: 6, name: "Build a Game", icon: "🎮", xp: 150,
      tasks: [
        { emoji: "🎯", title: "Make a quiz game", desc: "Ask Claude to build you a quiz!", xp: 150,
          prompt: `Make me a fun quiz game about [YOUR TOPIC].

3 questions with buttons to click.
Tell me if I got it right or wrong.
Keep score!` }
      ]
    },
    {
      id: 7, name: "Hackathon Ready", icon: "🏆", xp: 200,
      tasks: [
        { emoji: "🚀", title: "You did it!", desc: "You're ready for the family hackathon! Show everyone what you made!", xp: 200 }
      ]
    }
  ];

  // State
  let user = null;
  let picked = '🦸';
  let currentLevel = null;
  let currentTask = 0;

  // Show/hide screens
  function go(id) {
    document.querySelectorAll('body > div').forEach(d => {
      if (!d.classList.contains('toast') && !d.classList.contains('xp')) {
        d.classList.add('hide');
      }
    });
    document.getElementById(id).classList.remove('hide');
  }

  // Toast
  function toast(msg, err) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast' + (err ? ' error' : '');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // Login
  async function tryLogin() {
    const name = document.getElementById('nameInput').value.trim();
    const code = document.getElementById('codeInput').value;
    if (!name || !code) { toast('Fill in both!', true); return; }
    
    const { data } = await db.from('hackathon_users')
      .select('*').eq('name', name.toLowerCase()).eq('secret_code', code).single();
    
    if (!data) { toast('Wrong name or code!', true); return; }
    
    user = data;
    localStorage.setItem('cq', JSON.stringify(user));
    showHome();
  }

  // Signup
  async function trySignup() {
    const name = document.getElementById('newName').value.trim();
    const code = document.getElementById('newCode').value;
    
    if (!name || !code) { toast('Fill in both!', true); return; }
    if (code.length < 4) { toast('Code needs 4+ letters!', true); return; }
    
    const { data: exists } = await db.from('hackathon_users')
      .select('id').eq('name', name.toLowerCase()).single();
    
    if (exists) { toast('Name taken!', true); return; }
    
    const { data } = await db.from('hackathon_users').insert({
      name: name.toLowerCase(),
      display_name: name,
      secret_code: code,
      avatar: '🦸',
      xp: 0,
      completed_tasks: [],
      current_mission: 1
    }).select().single();
    
    if (!data) { toast('Error, try again!', true); return; }
    
    user = data;
    localStorage.setItem('cq', JSON.stringify(user));
    go('avatar');
  }

  // Avatar
  function pick(emoji, el) {
    picked = emoji;
    document.getElementById('pickedAvatar').textContent = emoji;
    document.querySelectorAll('.avatar').forEach(a => a.classList.remove('selected'));
    el.classList.add('selected');
  }

  async function saveAvatar() {
    await db.from('hackathon_users').update({ avatar: picked }).eq('id', user.id);
    user.avatar = picked;
    localStorage.setItem('cq', JSON.stringify(user));
    toast('Looking good! ✨');
    showHome();
  }

  // Home
  function showHome() {
    document.getElementById('xpDisplay').classList.remove('hide');
    document.getElementById('xpDisplay').textContent = '⭐ ' + user.xp;
    document.getElementById('userName').textContent = user.display_name;
    
    const list = document.getElementById('levelList');
    list.innerHTML = '';
    
    LEVELS.forEach((lvl, i) => {
      const done = (user.current_mission || 1) > lvl.id;
      const current = (user.current_mission || 1) === lvl.id;
      const locked = (user.current_mission || 1) < lvl.id;
      
      const card = document.createElement('div');
      card.className = 'level-card' + (done ? ' done' : current ? ' current' : locked ? ' locked' : '');
      card.innerHTML = `
        <div class="level-icon">${done ? '✅' : lvl.icon}</div>
        <div class="level-info">
          <h3>${lvl.name}${locked ? ' 🔒' : ''}</h3>
          <span>${done ? 'Complete!' : lvl.xp + ' XP'}</span>
        </div>
      `;
      
      if (!locked) {
        card.onclick = () => startLevel(lvl.id);
      }
      
      list.appendChild(card);
    });
    
    go('home');
  }

  // Start level
  function startLevel(id) {
    currentLevel = LEVELS.find(l => l.id === id);
    currentTask = 0;
    showTask();
  }

  // Show task
  function showTask() {
    const task = currentLevel.tasks[currentTask];
    
    // Dots
    const dots = document.getElementById('taskDots');
    dots.innerHTML = currentLevel.tasks.map((t, i) => 
      `<div class="dot ${i < currentTask ? 'done' : i === currentTask ? 'now' : ''}"></div>`
    ).join('');
    
    document.getElementById('taskEmoji').textContent = task.emoji;
    document.getElementById('taskTitle').textContent = task.title;
    document.getElementById('taskDesc').textContent = task.desc;
    
    const copyBox = document.getElementById('copyBox');
    if (task.prompt) {
      copyBox.classList.remove('hide');
      document.getElementById('copyText').textContent = task.prompt;
    } else {
      copyBox.classList.add('hide');
    }
    
    go('task');
  }

  // Copy prompt
  function copyIt() {
    const text = document.getElementById('copyText').textContent;
    navigator.clipboard.writeText(text);
    toast('Copied! Now paste it to Claude 📋');
  }

  // Complete task
  async function done() {
    const task = currentLevel.tasks[currentTask];
    const xp = user.xp + task.xp;
    
    let newMission = user.current_mission || 1;
    if (currentTask === currentLevel.tasks.length - 1 && currentLevel.id === newMission) {
      newMission = currentLevel.id + 1;
    }
    
    await db.from('hackathon_users').update({ 
      xp: xp, 
      current_mission: newMission 
    }).eq('id', user.id);
    
    user.xp = xp;
    user.current_mission = newMission;
    localStorage.setItem('cq', JSON.stringify(user));
    document.getElementById('xpDisplay').textContent = '⭐ ' + xp;
    
    // Level complete?
    if (currentTask === currentLevel.tasks.length - 1) {
      document.getElementById('levelDoneMsg').textContent = `You earned ${currentLevel.xp} XP!`;
      go('levelDone');
    } else {
      document.getElementById('successMsg').textContent = `+${task.xp} XP`;
      go('success');
    }
  }

  // Next task
  function nextStep() {
    currentTask++;
    if (currentTask >= currentLevel.tasks.length) {
      showHome();
    } else {
      showTask();
    }
  }

  // Leaderboard
  async function loadLeaders() {
    const { data } = await db.from('hackathon_users')
      .select('*').order('xp', { ascending: false }).limit(10);
    
    const list = document.getElementById('leaderList');
    list.innerHTML = data.map((u, i) => `
      <div class="leader ${u.id === user?.id ? 'me' : ''}">
        <div class="leader-rank">${i + 1}</div>
        <div>${u.avatar}</div>
        <div class="leader-name">${u.display_name}</div>
        <div class="leader-xp">${u.xp} ⭐</div>
      </div>
    `).join('');
    
    go('leaders');
  }

  // Override go for leaders
  const originalGo = go;
  go = function(id) {
    if (id === 'leaders') {
      loadLeaders();
      return;
    }
    originalGo(id);
  };

  // Init
  async function init() {
    const saved = localStorage.getItem('cq');
    if (saved) {
      user = JSON.parse(saved);
      const { data } = await db.from('hackathon_users').select('*').eq('id', user.id).single();
      if (data) {
        user = data;
        localStorage.setItem('cq', JSON.stringify(user));
        showHome();
      } else {
        localStorage.removeItem('cq');
      }
    }
  }

  init();
</script>

</body>
</html>
